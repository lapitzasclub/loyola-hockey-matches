<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="#0e3a43" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Loyola Hockey" />
    <meta name="application-name" content="Loyola Hockey" />
    <meta name="format-detection" content="telephone=no" />
    <title>Partidos Loyola Indautxu A</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="512x512" href="/loyola_hockey.png" />
    <link rel="icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/loyola_hockey.png" color="#0e3a43" />
    <link rel="stylesheet" href="/styles/theme.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/components-partidos.css" />
    <link rel="stylesheet" href="/styles/components-clasificacion.css" />
    <link rel="stylesheet" href="/styles/components-comunes.css" />
    <link rel="stylesheet" href="/styles/components-partido-detalle.css" />
    <link rel="stylesheet" href="/styles/components-equipo-selector.css" />

    <link rel="stylesheet" href="/styles/responsive.css" />
    <link rel="stylesheet" href="/styles/spinner.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <button id="menuBtn" class="menu-btn">&#9776;</button>
        <span class="logo-header" id="logoHeader"></span>
        <div class="header-titles">
          <span id="headerTitle"></span>
          <span id="headerSubtitle" class="header-subtitle" hidden></span>
        </div>
      </div>
    </header>
    <!-- Menú lateral y overlay fuera del header para stacking global -->
    <nav
      id="sideMenu"
      class="side-menu"
      aria-label="Menú lateral"
      data-i18n-aria="side_menu_aria"
    >
      <div class="side-menu-content">
        <div class="side-menu-header">
          <button id="sideMenuCloseBtn" class="side-menu-close" aria-label="Cerrar menú" data-i18n-aria="side_menu_close">
            <img src="/assets/sidebar-loyola/iconos_svg/icono_cerrar.svg" alt="" aria-hidden="true">
          </button>
        </div>
        <div class="side-menu-stack">
          <div id="teamSelectorMenuContainer"></div>
          <select
            id="equipoLoyolaSelect"
            class="equipo-loyola-select"
            hidden
          ></select>

          <div class="side-menu-control-separator side-menu-control-separator-upper" aria-hidden="true"></div>

          <div class="side-menu-control-block side-menu-control-block-lang">
            <div class="side-menu-lang-card" role="group" aria-label="Idioma">
              <div class="side-menu-control-icon side-menu-control-icon-inline" aria-hidden="true">
                <img src="/assets/sidebar-loyola/iconos_svg/icono_idioma_globo.svg" alt="">
              </div>
              <button type="button" class="side-menu-chip" data-lang-option="es">ES</button>
              <span class="side-menu-chip-separator" aria-hidden="true">|</span>
              <button type="button" class="side-menu-chip" data-lang-option="eu">EU</button>
            </div>
            <select id="langSelect" hidden>
              <option value="es">Español</option>
              <option value="eu">Euskera</option>
            </select>
          </div>

          <div class="side-menu-control-separator side-menu-control-separator-lower" aria-hidden="true"></div>

          <div class="side-menu-control-block side-menu-control-block-theme">
            <div id="themeCycleBtn" class="side-menu-theme-cycle" role="group" aria-label="Cambiar tema">
              <button type="button" class="side-menu-theme-option" data-theme-option="light">
                <span class="side-menu-theme-option-icon" aria-hidden="true"><img src="/assets/sidebar-loyola/iconos_svg/icono_tema_dia.svg" alt=""></span>
                <span class="side-menu-theme-option-label">Día</span>
              </button>
              <button type="button" class="side-menu-theme-option" data-theme-option="dark">
                <span class="side-menu-theme-option-icon" aria-hidden="true"><img src="/assets/sidebar-loyola/iconos_svg/icono_tema_noche.svg" alt=""></span>
                <span class="side-menu-theme-option-label">Noche</span>
              </button>
              <button type="button" class="side-menu-theme-option" data-theme-option="auto">
                <span class="side-menu-theme-option-icon" aria-hidden="true"><img src="/assets/sidebar-loyola/iconos_svg/icono_tema_auto.svg" alt=""></span>
                <span class="side-menu-theme-option-label">Auto</span>
              </button>
            </div>
            <select id="themeSelect" hidden>
              <option value="auto" data-i18n="theme_auto">Automático</option>
              <option value="light" data-i18n="theme_light">Claro</option>
              <option value="dark" data-i18n="theme_dark">Oscuro</option>
            </select>
          </div>
        </div>
      </div>
    </nav>
    <div id="sideMenuOverlay" class="side-menu-overlay"></div>
    <main>
      <div id="pullToRefresh" class="pull-to-refresh">
        <span id="ptrIcon" class="ptr-icon" data-state="down">
          <svg
            class="ptr-icon-arrow"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            width="24"
            height="24"
          >
            <path
              d="M7 10l5 5 5-5"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="ptr-icon-spinner" aria-hidden="true"></span>
        </span>
        <span id="ptrText" class="ptr-text">Desliza para refrescar...</span>
      </div>
      <div id="screenContent">
        <ul id="matches"></ul>
      </div>
      <div id="teamSelectorOverlay" class="team-selector-overlay" hidden></div>
    </main>
    <nav
      class="bottom-nav app-hidden-initially"
      aria-label="Navegación principal"
      data-i18n-aria="bottom_nav_aria"
      data-active-tab="0"
    >
      <div class="bottom-nav-track" aria-hidden="true">
        <span class="bottom-nav-indicator"></span>
      </div>
      <button id="navPartidos" class="nav-btn active" data-i18n="nav_matches" data-nav-index="0">
        <span class="nav-btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <rect x="4.5" y="6.5" width="15" height="12.5" rx="2.5" />
            <path d="M8 4.75V8" />
            <path d="M16 4.75V8" />
            <path d="M4.5 10H19.5" />
            <path d="M8 13H8.01" />
            <path d="M12 13H12.01" />
            <path d="M16 13H16.01" />
          </svg>
        </span>
        <span class="nav-btn-label">Partidos</span>
      </button>
      <button id="navClas" class="nav-btn" data-i18n="nav_clas" data-nav-index="1">
        <span class="nav-btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <rect x="4.5" y="6" width="15" height="12" rx="2" />
            <path d="M4.5 10H19.5" />
            <path d="M9.5 6V18" />
            <path d="M14.5 6V18" />
          </svg>
        </span>
        <span class="nav-btn-label">Clasificación</span>
      </button>
    </nav>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/jquery.signalR-2.4.3.min.js"></script>
    <script id="signalr-hubs-script"></script>
    <script type="module" src="core/main.js"></script>
  </body>
</html>
